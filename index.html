<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Epoch</title>
</head>

<body class="overflow-hidden">
    <div class="flex flex-col w-full h-screen">
        <div class="header p-6 pl-3 flex items-center justify-start w-full h-10 bg-main3">
            <span class="italic text-[22px]">Epoch</span>
            <span class="mute ml-auto">Mute Music</span>
        </div>
        <hr class="text-hr">
        <div class="main-tab-bar pl-3 pt-0 flex items-center list-none justify-start w-full h-12 bg-main2ish">
        </div>
        <div class="sub-tab-bar pl-8 flex items-center list-none justify-start w-full h-9 bg-main2ishish">
        </div>
        <hr class="text-hr">
        <div class="bg-radial-[at_50%_50%] from-main2 to-main3 h-full flex items-center justify-between p-x-10 overflow-hidden">
            <div class="flex flex-col w-full h-full justify-start max-w-md rounded-2xl p-5">
                <script type="module" src="./src/scripts/tab.ts"></script>



                <div class="display p-4 gap-4 flex flex-col h-full w-full rounded-b-2xl">

                </div>




                <template class="home">
                    <div class="flex gap-5 p-2 items-center justify-start rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:25%] w-full">
                        <span class="italic">Name</span><textarea class="civilization-name-set focus:border-transparent focus:outline-none resize-none w-full h-5"></textarea>
                        <span class="random_civ_name_button hover:brightness-110 active:brightness-120"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#d9c06d">
                            <path
                                d="M354.5-269.5Q372-287 372-312t-17.5-42.5Q337-372 312-372t-42.5 17.5Q252-337 252-312t17.5 42.5Q287-252 312-252t42.5-17.5Zm0-336Q372-623 372-648t-17.5-42.5Q337-708 312-708t-42.5 17.5Q252-673 252-648t17.5 42.5Q287-588 312-588t42.5-17.5Zm168 168Q540-455 540-480t-17.5-42.5Q505-540 480-540t-42.5 17.5Q420-505 420-480t17.5 42.5Q455-420 480-420t42.5-17.5Zm168 168Q708-287 708-312t-17.5-42.5Q673-372 648-372t-42.5 17.5Q588-337 588-312t17.5 42.5Q623-252 648-252t42.5-17.5Zm0-336Q708-623 708-648t-17.5-42.5Q673-708 648-708t-42.5 17.5Q588-673 588-648t17.5 42.5Q623-588 648-588t42.5-17.5ZM216-144q-29.7 0-50.85-21.15Q144-186.3 144-216v-528q0-29.7 21.15-50.85Q186.3-816 216-816h528q29.7 0 50.85 21.15Q816-773.7 816-744v528q0 29.7-21.15 50.85Q773.7-144 744-144H216Zm0-72h528v-528H216v528Zm0-528v528-528Z" />
                        </svg></span>
                    </div>
                </template>



                <template class="conquest">
                    <p class="text-2xl p-5">Conquest</p>
                </template>



                <template class="settings">
                    <h1 class="font-bold">Settings</h1>
                    <button onclick="localStorage.clear()" class="reset p-2 bg-main2 hover:brightness-120 rounded-lg">
                        <p class="">Reset</p>
                    </button>
                </template>
            </div>


            <div class="w-full ml-auto h-full flex-col justify-start rounded-2xl items-start">
                <div class="sub-display border-x-2 border-hr p-5 gap-4 flex flex-col h-full w-full bg-transparent overflow-hidden">
                </div>
                <template class="farms">
                    <div class="flex flex-col items-start justify-start gap-4 p-2 h-full">
                        
                        <div class="flex w-full">
                            <p class="italic text-main0">Farms</p>
                        </div>

                        <hr class="border-main0 w-full">
                        <div class="flex w-full">
                            <div class="w-full h-full flex flex-col gap-5">
                                <div class="relative inline-block group">
                                    <button class="p-2 bg-main2 hover:brightness-120 rounded-lg">
                                        <p class="gather-food">Gather Food</p>
                                    </button>
                                    <div
                                        class="absolute top-full z-10 left-1/2 mt-2
                                                                                              invisible opacity-0 group-hover:visible group-hover:opacity-100
                                                                                              transition-opacity duration-200
                                                                                              p-2 text-sm max-w-150 min-w-50 min-h-0 border-2 bg-main2">
                                        gather 10 food
                                    </div>
                                </div>
                                <div class="agriculture_unlocked relative inline-block group">
                                    <button class="p-2 bg-main2 hover:brightness-120 rounded-lg">
                                        <p class="make-farm">Make Farm</p>
                                    </button>
                                
                                    <div class="absolute top-full z-10 left-1/2 mt-2
                                                                      invisible opacity-0 group-hover:visible group-hover:opacity-100
                                                                      transition-opacity duration-200
                                                                      p-2 text-sm max-w-150 min-w-50 min-h-0 border-2 bg-main2">
                                        costs 10 wood and stone.
                                    </div>
                                </div>


                                <hr class="harvest-progress agriculture_unlocked border-emerald-600 w-0 rounded-full">
                            </div>
                            <div class="w-full h-full flex flex-col gap-4">
                                <div class="agriculture_unlocked flex gap-4 p-2 rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:10%] w-1/3">
                                    <p class="farmers">Farmers: 0</p>
                                </div>
                                <div class="agriculture_unlocked flex gap-4 p-2 rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:10%] w-1/3">
                                    <p class="farms">Farms: 0</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <template class="research">
                    <div class="viewport border-2 border-main1 relative w-full h-full overflow-hidden">
                        <div class="world relative">

                        </div>
                        <template class="technology">
                            <div
                                class="absolute technology_button hover:brightness-110 active:brightness-80 flex h-15 w-35 p-2 gap-2 border-2 border-main1">
                                <p class="name"></p>
                                <p class="cost"></p>
                                <span
                                    class="tech_tooltip description absolute left-45 p-2 text-sm max-w-150 min-w-50 min-h-0 border-2 bg-main2"></span>
                            </div>
                        </template>
                    </div>
                </template>
                <template class="forage">
                    <div class="flex flex-col items-start justify-start p-2 gap-4">

                        <div class="flex">
                            <p class="italic text-main0">Foraging</p>
                        </div>
                        
                        <hr class="border-main0 w-full">

                        <div class="contents">
                            <p class="foragers">Foragers: 0</p>
                            <hr class="forage-progress border-emerald-600 w-0 rounded-full">
                        </div>
                        <button is="timeout-button" timeout="1000"
                            class="forage-button p-2 bg-main2 hover:brightness-120 rounded-lg">
                            <p class="">Forage</p>
                        </button>
                    </div>
                </template>
                <template class="government">
                    <div class="flex flex-col items-start justify-start p-2 gap-4">

                        <div class="flex">
                            <p class="italic text-main0">Government</p>
                        </div>

                        <hr class="border-main0 w-full">

                        <p class="population">Population: 0</p>
                        <div class="border-2 border-hr w-full h-2.3">
                            <hr class="population-progress border-3 border-emerald-600 w-0">
                        </div>
                        <div class="flex flex-col items-start justify-start gap-4 w-full">
                            <div class="relative inline-block group w-full">
                                <button class="p-2 bg-main2 hover:brightness-120 w-1/2 rounded-lg">
                                    <p class="make-home">Make Home</p>
                                </button>
                                <div
                                    class="absolute top-full z-10 left-1/2 mt-2
                                                                                        invisible opacity-0 group-hover:visible group-hover:opacity-100
                                                                                        transition-opacity duration-200
                                                                                        p-2 text-sm max-w-150 min-w-50 min-h-0 border-2 bg-main2">
                                    costs 150 wood and 100 stone. Increases population cap by 5.
                                </div>
                            </div>
                            <p class="homes">Homes: 0</p>
                            <div class="basic_military_unlocked flex gap-4">
                                <p class="soldiers">Soldiers: 0</p>
                                <button class="add-soldier button">+</button>
                                <button class="remove-soldier button">-</button>
                            </div>

                            <div class="agriculture_unlocked flex gap-4">
                                <p class="farmers">Farmers: 0</p>
                                <button class="add-farmer button">
                                    <span class="hover:scale-150">+</span>
                                </button>
                                <button class="remove-farmer button">-</button>
                            </div>

                            <div class="flex gap-4">
                                <p class="foragers">Foragers: 0</p>
                                <button class="add-forager button">
                                    <span class="hover:scale-150">+</span>
                                </button>
                                <button class="remove-forager button">-</button>
                            </div>
                        </div>
                    </div>
            </div>
            </template>
            <template class="plan">
                <div class="flex flex-col items-start justify-start gap-4 h-full overflow-y-auto scrollbar-none">
                    <div class="neighboring_civilizations flex flex-col items-start w-full justify-start gap-8">

                    </div>
                    <template class="civilization">
                        <div
                            class=" hover:brightness-110 active:brightness-80 flex flex-col p-5 gap-2 border-2 w-full border-main1 scroll-auto">
                            <div class="flex">
                                <p class="civ-name"></p>
                                <p class="civ-population ml-auto"></p>
                            </div>




                            <!-- military strength display -->
                            <div class="flex flex-col items-start justify-start gap-4">
                                <div class="relative inline-block group">
                                    <div class="p-2 bg-main2 rounded-lg">
                                        <p class="civ-military-strength"></p>
                                    </div>
                                    <div class="absolute top-full z-50 left-1/2 mt-2
                                                    invisible opacity-0 group-hover:visible group-hover:opacity-100
                                                    transition-opacity duration-200
                                                    p-2 text-sm max-w-150 min-w-50 min-h-0 border-2 bg-main2">
                                        Military power of this civilization
                                    </div>
                                </div>
                            </div>

                            <!-- civilization type display -->
                            <div class="flex flex-col items-start justify-start gap-4">
                                <div class="relative inline-block group">
                                    <div class="p-2 bg-main2 rounded-lg">
                                        <p class="civ-type"></p>
                                    </div>
                                    <div
                                        class="absolute top-full z-50 left-1/2 mt-2
                                                                                                                                                        invisible opacity-0 group-hover:visible group-hover:opacity-100
                                                                                                                                                        transition-opacity duration-200
                                                                                                                                                        p-2 text-sm max-w-150 min-w-50 min-h-0 border-2 bg-main2">
                                        Civilization type
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>


        <div class="w-full h-full max-w-xs flex-col p-5 justify-start rounded-2xl items-start gap-4">
            <div class="flex">
                <p class="p-2">Storage</p>
            </div>
            <hr class="mt-2">
            <div class="flex flex-col gap-4 justify-start items-start max-w-3xs w-full pt-5 pr-0 h-full overflow-hidden">
                <div class="p-2 rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:10%] w-full">
                    <span class="food">Food: 0</span>
                    <div class="border-2 border-hr w-full h-2.3">
                        <hr class="food-depletion-progress border-3 border-orange-700 w-0">
                    </div>
                </div>

                <span
                    class="ore metal_working_unlocked p-2 rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:10%] w-full">Ore:
                    0</span>

                <span class="wood p-2 rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:10%] w-full">Wood: 0</span>

                <span class="stone p-2 rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:10%] w-full">Stone: 0</span>

                <span class="research-points p-2 rounded-xs bg-main0/(--bg-opacity) [--bg-opacity:10%] w-full">Research:
                    0</span>
                <button class="give-research p-2 min-w-0 bg-main2 hover:brightness-120 rounded-lg">Give
                    Research</button>
            </div>
            <script type="module" src="./src/scripts/storage.ts"></script>
        </div>

        <div class="w-0 border-l-2 h-full border-hr"></div>

        <div class=" w-full h-full max-w-3xs flex flex-col p-5 justify-start items-start overflow-hidden">
            <div class="flex justify-between w-full">
                <p class="p-2">Events</p>
                <button class="clear-button p-2 min-w-0 bg-main2 rounded-lg hover:brightness-120">Clear</button>
            </div>
            <hr class="mt-2 w-full">
            <div class="dialogue-box flex-col justify-start items-start max-w-3xs w-full pt-5 h-full overflow-hidden">

            </div>
        </div>

        <script type="module" src="./src/scripts/event_dialogue.ts"></script>
    </div>
    <div class="bg-main2ishish border-t-2 border-hr text-xs">
        Music by <a href="https://composerlarkin.com/" class="text-orange-400">Christopher Larkin</a> from <a
            href="https://www.hollowknight.com/" class="text-orange-400">Hollow Knight</a>
    </div>
    </div>

    <script type="module" src="./src/scripts/main.ts"></script>
    <script type="module" src="./src/scripts/events.ts"></script>
</body>

</html>
